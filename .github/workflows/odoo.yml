name: Odoo CI

on:
  push:
    branches:
      - main

jobs:
  odoo-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python
        run: python --version

      - name: Odoo Demo
        run: echo "Odoo Pipeline Running Successfully"
